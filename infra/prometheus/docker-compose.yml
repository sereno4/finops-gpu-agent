version: "3.8"

services:

  gpu-mock-exporter:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../../:/app
    command: sh -c "pip install prometheus-client pyyaml -q && python start_exporter.py"
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=1h"
    depends_on:
      - gpu-mock-exporter

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - prometheus
